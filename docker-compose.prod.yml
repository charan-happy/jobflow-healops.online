services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jobflow-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-jobflow}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: jobflow-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-backend
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobflow}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-jobflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      ENV: production
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-celery
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobflow}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-jobflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=2
    networks:
      - internal

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jobflow-beat
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-jobflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobflow}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-jobflow}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-jobflow}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker.celery_app beat --loglevel=info
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}
    container_name: jobflow-frontend
    restart: always
    ports:
      - "127.0.0.1:3010:3010"
    networks:
      - internal

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: jobflow-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=90d"
    networks:
      - internal

  grafana:
    image: grafana/grafana:10.4.0
    container_name: jobflow-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: https://grafana.${DOMAIN}
      GF_SERVER_DOMAIN: grafana.${DOMAIN}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - internal

volumes:
  pgdata:
  uploads:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
